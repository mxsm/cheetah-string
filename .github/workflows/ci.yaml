name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main"]
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  CI: true

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable,nightly]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          override: true
          toolchain: ${{ matrix.rust }}

      - name: Install dependencies
        run: |
          rustup component add rustfmt
          rustup component add clippy

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy check
        run: cargo clippy --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose --all-features

      - name: no_std check
        run: cargo check --verbose --no-default-features

      - name: no_std feature matrix check
        run: cargo check --verbose --no-default-features --features serde,bytes,simd

      - name: Test
        run: cargo test --verbose --all-features

      - name: Layout snapshot
        run: cargo test layout_snapshot --all-features -- --nocapture

      - name: Upload layout artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layout-${{ matrix.os }}-${{ matrix.rust }}
          path: target/layout-artifacts
          if-no-files-found: ignore
